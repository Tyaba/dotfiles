# =============================================================================
# General
# =============================================================================

# Prefix: C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -s escape-time 0
set -g history-limit 1000000
set -g default-shell /bin/zsh
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g detach-on-destroy off
set -g set-clipboard on
set -g focus-events on

# Pass escape sequences through to the outer terminal (Ghostty/iTerm2/Kitty)
# Required for Claude Code notifications and progress bar inside tmux
set -g allow-passthrough on

# True Color & undercurl support (Ghostty / xterm-ghostty)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:Tc,xterm-256color:Tc"
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# =============================================================================
# Key Bindings
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes (intuitive keys, open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (vim-like, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Window/session chooser with pane title (shows Claude Code status)
bind w choose-tree -swZ -F "#{?window_active,*, } #I:#W  #{pane_title}"

# =============================================================================
# Mouse
# =============================================================================

set -g mouse on

# =============================================================================
# Copy Mode (vi)
# =============================================================================

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =============================================================================
# Activity Monitoring
# =============================================================================

setw -g monitor-activity on
set -g visual-activity off

# =============================================================================
# Status Bar — Gruvbox Dark
# =============================================================================

# Gruvbox palette
# bg0:    #282828   bg1:    #3c3836   bg2:    #504945
# fg0:    #fbf1c7   fg1:    #ebdbb2   fg4:    #a89984
# orange: #d65d0e   yellow: #d79921   green:  #98971a
# aqua:   #689d6a   red:    #cc241d   blue:   #458588

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Status bar colors
set -g status-style "fg=#a89984,bg=#3c3836"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#282828,bg=#d65d0e,bold] #S #[fg=#d65d0e,bg=#3c3836,nobold]"

# Right: host and time
set -g status-right-length 60
set -g status-right "#[fg=#504945,bg=#3c3836]#[fg=#a89984,bg=#504945] %Y-%m-%d #[fg=#a89984,bg=#504945]#[fg=#ebdbb2,bg=#504945] %H:%M #[fg=#d65d0e,bg=#504945]#[fg=#282828,bg=#d65d0e,bold] #h "

# Window status (inactive)
setw -g window-status-format "#[fg=#a89984,bg=#3c3836] #I:#W "

# Window status (active) — orange highlight
setw -g window-status-current-format "#[fg=#3c3836,bg=#d65d0e]#[fg=#282828,bg=#d65d0e,bold] #I:#W #[fg=#d65d0e,bg=#3c3836]"

# Window with activity — subtle yellow
setw -g window-status-activity-style "fg=#d79921,bg=#3c3836"

# Pane borders
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#d65d0e"

# Message / command prompt
set -g message-style "fg=#ebdbb2,bg=#504945,bold"
set -g message-command-style "fg=#ebdbb2,bg=#504945"

# Copy mode highlight
setw -g mode-style "fg=#282828,bg=#d79921"

# =============================================================================
# Plugins (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: save/restore sessions
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'

# Auto-install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/bin/tpm'
