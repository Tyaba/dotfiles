global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true   # 8080 は host 側 127.0.0.1 のみに bind 済み

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: false
  websecure:
    address: ":443"
    http:
      tls: {}

# providers.file は dynamic.yaml (tls.certificates / tls.stores) をロードする。
# Traefik v3 は tls.* を静的設定に置いても silently 無視するので dynamic 側で扱う必要がある。
providers:
  file:
    filename: /etc/traefik/dynamic.yaml
    watch: true
  docker:
    exposedByDefault: false
    network: tyaba-proxy
    watch: true

log:
  level: INFO

accessLog: {}
