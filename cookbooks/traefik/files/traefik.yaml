global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true   # 8080 は host 側 127.0.0.1 のみに bind 済み

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: false
  websecure:
    address: ":443"
    http:
      tls: {}

providers:
  docker:
    exposedByDefault: false
    network: tyaba-proxy
    watch: true

tls:
  certificates:
    - certFile: /certs/_wildcard.test.pem
      keyFile: /certs/_wildcard.test-key.pem

log:
  level: INFO

accessLog: {}
